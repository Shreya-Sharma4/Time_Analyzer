<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quiz Analytics Dashboard</title>
    <script src="vendor/chart.umd.min.js"></script>
    <style>
        html, body { width: 900px; min-height: 600px; margin: 0; padding: 0; background: #f8f9fa; font-family: "Segoe UI", Roboto, sans-serif; color: #3c4043; }
        #dashboard-login { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .login-box { text-align: center; width: 350px; padding: 40px; border-radius: 8px; border: 1px solid #dadce0; background: #fff; box-shadow: 0 1px 3px rgba(60,64,67,0.3); }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 500; }
        #dashboard-content { display: none; padding: 30px; }
        .card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; border: 1px solid #dadce0; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-item { text-align: center; padding: 15px; border-radius: 8px; background: #f8f9fa; border: 1px solid #eee; }
        .stat-val { font-size: 24px; font-weight: bold; color: #1a73e8; }
        .stat-lbl { font-size: 11px; color: #70757a; text-transform: uppercase; }
        .badge { padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .green { background: #e6f4ea; color: #137333; }
        .red { background: #fce8e6; color: #c5221f; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #f1f3f4; font-size: 13px; color: #5f6368; }
        td { padding: 12px; border-bottom: 1px solid #f1f3f4; font-size: 14px; }
        .chart-container { display: flex; flex-direction: column; gap: 30px; margin-top: 20px; }
        .chart-box { position: relative; width: 100%; height: 400px; } 
        .suggestion-box { background: #e8f0fe; border-left: 4px solid #1a73e8; padding: 15px; border-radius: 4px; margin-top: 15px; }
    </style>
</head>
<body>
    <div id="dashboard-login">
        <div class="login-box">
            <h2>📊 Student Portal</h2>
            <p style="font-size: 13px; color: #5f6368;">View your quiz performance results</p>
            <input type="text" id="dash-user" placeholder="Student Username">
            <input type="password" id="dash-pass" placeholder="Password">
            <button id="dash-btn">View My Result</button>
            <p id="dash-error" style="color:red; display:none; margin-top:15px; font-size:12px;"></p>
        </div>
    </div>

    <div id="dashboard-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h1 id="user-welcome" style="margin:0; font-size:24px;">Dashboard</h1>
            <button id="logout-btn" style="padding:8px 16px; border:1px solid #dadce0; border-radius:4px; background:white; cursor:pointer;">Logout</button>
        </div>

        <div id="teacher-view" style="display:none;">
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h3>👥 Class Overview</h3>
                    <button id="download-report-btn" style="padding:8px 16px; background:#188038; color:white; border:none; border-radius:4px; cursor:pointer; font-weight:500;">⬇️ Download CSV Report</button>
                </div>
                <table id="teacher-table">
                    <thead><tr><th>Student</th><th>Accuracy</th><th>Time</th><th>Integrity</th><th>Type</th></tr></thead>
                    <tbody id="teacher-table-body"></tbody>
                </table>
            </div>
        </div>

        <div id="student-view" style="display:none;">
            <div class="stats-grid">
                <div class="stat-item"><div class="stat-val" id="std-accuracy">0%</div><div class="stat-lbl">Accuracy</div></div>
                <div class="stat-item"><div class="stat-val" id="std-time">0s</div><div class="stat-lbl">Time Taken</div></div>
                <div class="stat-item"><div class="stat-val" id="std-switches">0</div><div class="stat-lbl">Switches</div></div>
                <div class="stat-item"><div class="stat-val" id="std-category" style="font-size:16px;">--</div><div class="stat-lbl">Type</div></div>
            </div>
            <div class="card">
                <h3>📉 Performance Analysis</h3>
                <div class="chart-container">
                    <div class="chart-box"><canvas id="timingChart"></canvas></div>
                    <div class="chart-box" style="height:300px;"><canvas id="radarChart"></canvas></div>
                </div>
                <div class="suggestion-box"><strong>💡 Advice:</strong> <span id="ai-suggestion">...</span></div>
            </div>
            <div class="card">
                <h3>📝 Question Summary</h3>
                <table><thead><tr><th>Question</th><th>Reaction</th><th>Focus</th><th>Result</th><th>Speed</th></tr></thead><tbody id="student-table-body"></tbody></table>
            </div>
        </div>
    </div>
    <script src="analytics.js"></script>
</body>
</html>
